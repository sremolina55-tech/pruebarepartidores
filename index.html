<script>

let U=null,vendedores=[],tipologias=[],sectores=[],listasP=[],clientes=[],visitas=[],productos=[],pedidos=[],supIds=[],metas=[],prospectos=[],actividades=[];
let _agFecha="",_agMes="";
let editingId=null,pedLineas=[],pedTab=1,_pedData={},_visClId=null,_tipoPed="normal";
let _antecResult=null,_antecTimer=null;
const ANTEC_URL="http://localhost:10000";
function actualizarUrlServicio(){console.log('Servidor en: '+ANTEC_URL);}

// ── ANTECEDENTES POLICÍA ─────────────────────────────────────────────────────
function onCedulaInput(){
  const tipo=$("cf-td")?.value,ced=($("cf-cod")?.value||"").trim();
  if(tipo!=="13"||ced.length<5){_antecResult=null;const e=$("antec-box");if(e)e.style.display="none";return;}
  _antecResult=null;
  consultarAntecedentes(ced);
}

async function consultarAntecedentes(cedula){
  setAntecBox("cargando","Consultando antecedentes judiciales... (puede tardar ~1 min)");
  const ctrl=new AbortController();
  const tid=setTimeout(()=>ctrl.abort(),90000);
  try{
    const r=await fetch(ANTEC_URL+"/consulta-antecedentes",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({cedula}),
      signal:ctrl.signal
    });
    clearTimeout(tid);
    const d=await r.json();
    _antecResult=d;
    if(d.error){setAntecBox("error","Error: "+d.error);return;}
    const nom=d.nombre_policia||"";
    const nomLine=nom?`<div style="margin-top:6px;font-size:15px;font-weight:800;letter-spacing:.3px">👤 ${nom}</div>`:"";
    if(d.cedula_existe===false) setAntecBox("alerta","⚠ Cédula NO existe en el sistema de la Policía Nacional","");
    else if(d.tiene_antecedentes===true) setAntecBox("alerta","⚠ ALERTA: Tiene asuntos pendientes — NO otorgar cupo",nomLine);
    else if(d.tiene_antecedentes===false) setAntecBox("ok","✓ Cédula válida — Sin asuntos pendientes",nomLine);
    else setAntecBox("warn",d.mensaje||"No se pudo determinar. Verifica manualmente.","");
  }catch(e){
    clearTimeout(tid);
    const msg=e.name==="AbortError"?"Tiempo agotado (90s) — reintenta cuando tengas mejor señal":"Sin conexión con el servidor";
    _antecResult={error:msg};
    setAntecBox("error",msg);
  }
}

function setAntecBox(tipo,msg,nomLine=""){
  const e=$("antec-box");if(!e)return;

async function subirClienteXirux(cid){
  const btn=$("xirux-cl-btn");

  const cl=clientes.find(c=>c.id===cid);
  if(!cl){showT("Cliente no encontrado","error");if(btn){btn.disabled=false;btn.textContent="⬆ Subir a Xirux";}return;}
  const numDoc=(cl.codigo||"").replace(/-\d+$/,"");
  if(!numDoc){showT("Cliente sin NIT/CC","error");if(btn){btn.disabled=false;btn.textContent="⬆ Subir a Xirux";}return;}
  if(!cl.direccion){showT("El cliente requiere dirección","error");if(btn){btn.disabled=false;btn.textContent="⬆ Subir a Xirux";}return;}
  if(!cl.correo_electronico){showT("El cliente requiere correo electrónico","error");if(btn){btn.disabled=false;btn.textContent="⬆ Subir a Xirux";}return;}
  if(!cl.telefono&&!cl.celular){showT("El cliente requiere al menos un teléfono o celular","error");if(btn){btn.disabled=false;btn.textContent="⬆ Subir a Xirux";}return;}
  if(!cl.clasificacion_a){showT("Define la Clasificación A antes de subir a Xirux","error");if(btn){btn.disabled=false;btn.textContent="⬆ Subir a Xirux";}return;}
  const tipoMap={"13":"CC","31":"NI","22":"CE","41":"PA","47":"PE","11":"RC","12":"TI","21":"CE"};
  const tipoDoc=tipoMap[cl.tipo_documento]||"CC";
  const esNIT=tipoDoc==="NI";
  const ciudadCode=DIVIPOLA[cl.ciudad]||"11001";
  const ciudad="CO"+ciudadCode;
  const partes=(cl.nombre||"").trim().split(/\s+/);
  const body={
    CodTercero:numDoc,
    NumDoc:numDoc,
    TipoDoc:tipoDoc,
    Direccion:cl.direccion,
    Ciudad:ciudad,
    Correo:cl.correo_electronico,
    ClaseA:String(cl.clasificacion_a),
    EsCliente:"S",
    EsProveedor:"N",
    EsVendedor:"N"
  };
  if(cl.telefono)body.Telefono=cl.telefono;
  if(cl.celular)body.Celular=cl.celular;
  if(cl.xirux_agente_iva)body.AgeIva=cl.xirux_agente_iva;
  if(cl.xirux_agente_ica)body.AgeIca=cl.xirux_agente_ica;
  if(cl.xirux_actividad_ica)body.ActIca=cl.xirux_actividad_ica;
  if(cl.xirux_condpago)body.CondicionPago=cl.xirux_condpago;
  const codLisPre=cl.crm_listas_precio?.codigo_xirux;
  if(codLisPre)body.CodLisPre=String(codLisPre);
  const pv={CodPV:"1",Nombre:cl.nombre,Direccion:cl.direccion,Ciudad:ciudad,Correo:cl.correo_electronico};
  if(cl.celular)pv.Celular=cl.celular;else if(cl.telefono)pv.Telefono=cl.telefono;
  body.PuntoVenta=[pv];
  if(esNIT){body.Nombre=cl.nombre;body.RazonSocial=cl.nombre;}
  else{
    const n=partes.length;
    body.PriNombre=partes[0]||"";
    if(n===1){body.PriApell=partes[0]||"";}
    else if(n===2){body.PriApell=partes[1];}
    else if(n===3){body.PriApell=partes[1];body.SegApell=partes[2];}
    else{body.OtrNombre=partes[1];body.PriApell=partes[n-2];body.SegApell=partes[n-1];}
  }
  console.log("PAYLOAD TERCERO:",JSON.stringify(body));
  try{
    const res=await xiruxProxy("/api/Definiciones/Tercero",body);
    if(res.Valido===true){
      await api("crm_clientes","PATCH",{xirux_sync:true},"?id=eq."+cid);
      const idx=clientes.findIndex(c=>c.id===cid);if(idx>=0)clientes[idx].xirux_sync=true;
      showT(cl.nombre+" subido a Xirux ✓");
      renderClForm(clientes.find(c=>c.id===cid));
    }else{
      const detalle=res.Data?.[0]?.Detalle;
      const msg=(res.Mensaje||"Error")+(detalle&&detalle!==res.Mensaje?" — "+detalle:"");
      showT("Xirux: "+msg,"error");
      console.log("XIRUX RESP CLIENTE:",JSON.stringify(res));
      if(btn){btn.disabled=false;btn.textContent="⬆ Subir a Xirux";}
    }
  }catch(e){
    showT("Error: "+e.message,"error");

async function enviarXiruxPed(pid){
  const btn=$("xirux-btn");
  if(btn){btn.disabled=true;btn.textContent="Enviando a Xirux...";}
  let ped=pedidos.find(x=>x.id===pid);
  if(!ped){await loadPed();ped=pedidos.find(x=>x.id===pid);}
  if(!ped){showT("Pedido no encontrado","error");if(btn){btn.disabled=false;btn.textContent="⬆ Enviar a Xirux";}return;}
  const det=await api("crm_pedido_detalle","GET",null,"?pedido_id=eq."+pid+"&select=*,crm_productos(codigo)")||[];
  if(!det.length){showT("El pedido no tiene productos","error");if(btn){btn.disabled=false;btn.textContent="⬆ Enviar a Xirux";}return;}
  const clFull=(await api("crm_clientes","GET",null,"?id=eq."+ped.cliente_id+"&select=ciudad,xirux_sync,xirux_condpago"))?.[0]||{};
  if(!clFull.xirux_sync){
    showT("⚠ El cliente no está en Xirux. Súbelo primero desde su ficha (botón Subir a Xirux).","error");
    if(btn){btn.disabled=false;btn.textContent="⬆ Enviar a Xirux";}return;
  }
  const tercero=(ped.crm_clientes?.codigo||"").replace(/-\d+$/,"");
  const vendedor=ped.crm_vendedores?.nit||"";
  if(!tercero){showT("Cliente sin NIT/CC configurado","error");if(btn){btn.disabled=false;btn.textContent="⬆ Enviar a Xirux";}return;}
  if(!vendedor){showT("Vendedor sin NIT configurado","error");if(btn){btn.disabled=false;btn.textContent="⬆ Enviar a Xirux";}return;}
  const ciudadNom=clFull.ciudad||ped.crm_clientes?.ciudad||"";
  const ciudad="CO"+(DIVIPOLA[ciudadNom]||"11001");
  const cpRaw=ped.condicion_pago||"CONTADO";
  const condPago=cpRaw.match(/^(\d{4})/)?.[1]||CONDPAGO_OPTS.find(o=>o.l===cpRaw)?.v||"1000";
  const body={
    NroDocumento:"CRM-"+ped.numero_pedido,
    Operacion:"2130",
    Fecha:ped.fecha,
    FechaEntrega:ped.fecha_entrega||ped.fecha,
    Tercero:tercero,
    Vendedor:vendedor,
    PuntoVenta:ped.crm_sucursales?.codigo_sucursal||"1",
    Ciudad:ciudad,
    CondPago:condPago,
    ViaDespacho:"01",
    Detalle:det.map((d,i)=>{const it={NumItem:i+1,Producto:d.crm_productos?.codigo||"",Cantidad:d.cantidad,Valor:d.valor_unitario,PorIva:0};if(d.descuento_pct)it.PorDesc=d.descuento_pct;return it;})
  };
  if(ped.observaciones)body.Observacion=ped.observaciones;
  console.log("PAYLOAD PEDIDO XIRUX:",JSON.stringify(body));
  try{
    const res=await xiruxProxy("/api/Ventas/Pedido",body);
    if(res.Valido===true){
      await api("crm_pedidos","PATCH",{estado:"Enviado a ERP"},"?id=eq."+pid);
      await loadPed();
      showT("Pedido #"+ped.numero_pedido+" enviado a Xirux ERP ✓");
      viewPedDetail(pid);
    }else{
      const errores=(res.Data||[]).map(e=>e.Detalle||e.Mensaje).filter(Boolean).join(" — ");
      const msg=errores||res.Mensaje||JSON.stringify(res);
      showT("Xirux: "+msg,"error");
      console.log("RESPUESTA XIRUX:",JSON.stringify(res));
      if(btn){btn.disabled=false;btn.textContent="⬆ Enviar a Xirux";}
    }
  }catch(e){
    showT("Error conexión Xirux: "+e.message,"error");
    if(btn){btn.disabled=false;btn.textContent="⬆ Enviar a Xirux";}
  }
}

function filtActIca(q){
  const r=$("cf-xact-r");if(!r)return;
  if(!q){r.classList.remove("show");return}
  const ql=q.toLowerCase();
  const f=ACT_ICA_OPTS.filter(o=>o.v.startsWith(q)||o.l.toLowerCase().includes(ql));
  r.innerHTML=f.length?f.slice(0,12).map(o=>`<div onclick="selActIca('${o.v}','${o.l.replace(/'/g,"\\'")}')" style="display:flex;gap:8px"><strong style="min-width:38px">${o.v}</strong><span>${o.l}</span></div>`).join(""):`<div style="color:var(--muted)">Sin resultados</div>`;
  r.classList.add("show");
}

async function loadClActsSection(clId){
  try{
    const acts=await api("crm_actividades","GET",null,`?cliente_id=eq.${clId}&order=fecha.desc,hora_inicio.desc&select=*,crm_vendedores(nombre)&limit=20`)||[];
    const el=$("cl-acts-list");if(!el)return;
    if(!acts.length){el.innerHTML=`<div class="empty">Sin actividades · <span style="color:var(--accent);cursor:pointer" onclick="renderActForm(null,null,'${clId}','')">Programar la primera →</span></div>`;return}
    el.innerHTML=acts.map(a=>{
      const tipo=ACT_TIPOS.find(t=>t.v===a.tipo)||{ic:"📋",col:"#999",l:a.tipo||""};
      const stC={pendiente:"#f57c00",completada:"#388e3c",cancelada:"#9e9e9e"};
      const stL={pendiente:"Pendiente",completada:"Completada",cancelada:"Cancelada"};
      const venc=a.estado==="pendiente"&&a.fecha<today();
      const isPending=a.estado==="pendiente";
      return`<div class="ag-act-card" style="border-left-color:${venc?"#e53935":tipo.col}">
        <div class="act-top">
          <span class="act-time">${a.fecha}</span>
          <span class="act-ic">${tipo.ic}</span>
          <span class="act-title">${escHtml(a.titulo)}</span>
          <span style="background:${(stC[a.estado]||"#999")}18;color:${stC[a.estado]||"#999"};font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700">${stL[a.estado]||a.estado}</span>
          ${venc?`<span style="background:#ffebee;color:#c62828;font-size:10px;padding:2px 6px;border-radius:8px;font-weight:700">⚠ Vencida</span>`:""}
        </div>
        ${a.resultado?`<div class="act-result">📝 ${escHtml(a.resultado)}</div>`:""}
        <div class="act-sub"><span>${a.crm_vendedores?.nombre||""}</span></div>
        ${isPending?`<div class="act-actions">
          <button class="btn bg bsm" onclick="toggleClActRes('${a.id}')">✓ Completar</button>
          <button class="btn bs bsm" onclick="editActCl('${a.id}','${clId}')">✏ Editar</button>
          <button class="btn br bsm" onclick="cancelActCl('${a.id}','${clId}')">✗ Cancelar</button>
        </div>
        <div class="act-res-box" id="cl-res-box-${a.id}" style="display:none">
          <textarea id="cl-res-txt-${a.id}" placeholder="Resultado de la actividad..." rows="2"></textarea>
          <div style="display:flex;gap:8px;margin-top:6px">
            <button class="btn bg bsm" onclick="completeActCl('${a.id}','${clId}')">Guardar y completar</button>
            <button class="btn bs bsm" onclick="toggleClActRes('${a.id}')">Cancelar</button>
          </div>
        </div>`:""}
      </div>`}).join("");
  }catch(e){const el=$("cl-acts-list");if(el)el.innerHTML=`<div class="empty">Error cargando actividades</div>`}
}

async function sCl(eid){const cod=$("cf-cod")?.value.trim(),nom=$("cf-nom")?.value.trim(),ciu=$("cf-ciu")?.value,dir=$("cf-dir")?.value.trim(),tel=$("cf-tel")?.value.trim(),cel=$("cf-cel")?.value.trim(),ema=$("cf-ema")?.value.trim();
const vid=U.rol==="vendedor"?U.vendedor_id:($("cf-ven")?$("cf-ven").value:U.vendedor_id);
if(!cod||!nom||!ciu||!dir||!tel||!cel){showT("Completa campos obligatorios (incluye celular)","error");return}

// ── Verificación antecedentes (solo CC nuevos clientes) ──

  if(_antecResult===null){
    showT("Consultando antecedentes, espera...","warning");

}

const perfilCompleto=tieneCA&&tieneLP&&celReal&&telReal&&emaReal;
const p={codigo:cod,nombre:nom,tipo_documento:$("cf-td")?.value||"13",vendedor_id:vid||null,ciudad:ciu,barrio:$("cf-bar")?.value.trim()||null,direccion:dir,telefono:tel,celular:cel,correo_electronico:$("cf-ema")?.value.trim()||null,clasificacion_a:tieneCA||null,lista_precio_id:tieneLP||null,zona:$("cf-zon")?.value.trim()||"TAT",fecha_ingreso:today(),created_by:U.usuario,xirux_agente_iva:$("cf-xiva")?.value||null,xirux_agente_ica:$("cf-xica")?.value||null,xirux_actividad_ica:$("cf-xact")?.value||null,xirux_condpago:$("cf-xcop")?.value||null};
if(eid&&clExist?.prospecto_incompleto)p.prospecto_incompleto=!perfilCompleto;
const btn=$("cf-sv");btn.disabled=true;try{if(eid){await api("crm_clientes","PATCH",p,"?id=eq."+eid);showT(perfilCompleto&&clExist?.prospecto_incompleto?"✓ Perfil completado — ya puede hacer pedidos":"Actualizado")}else{const res=await api("crm_clientes","POST",p);if(res&&res[0]&&_tempSucs.length){for(const s of _tempSucs){try{await api("crm_sucursales","POST",{cliente_id:res[0].id,codigo_sucursal:s.codigo_sucursal,nombre:s.nombre,direccion:s.direccion,ciudad:s.ciudad,activo:true})}catch(ex){}}}_tempSucs=[];showT("Creado"+(res&&res[0]&&_tempSucs.length?" con sucursales":""))}showView("clientes")}catch(e){showT(e.message.includes("duplicate")?"Ya existe":"Error: "+e.message,"error")}finally{btn.disabled=false}}

async function reloadMapData(){
  if(!_mapObj){setTimeout(reloadMapData,200);return;}
  const fecha=$("map-fecha")?.value||today();
  // Limpiar marcadores previos
  (window._mapVisMarkers||[]).forEach(m=>_mapObj.removeLayer(m));
  (window._mapProMarkers||[]).forEach(m=>_mapObj.removeLayer(m));
  (window._mapPedMarkers||[]).forEach(m=>_mapObj.removeLayer(m));
  window._mapVisMarkers=[];window._mapProMarkers=[];window._mapPedMarkers=[];
  // Cargar datos
  let visGPS=[];let prosGPS=[];let pedsGPS=[];
  const fechaEnt=$("map-entrega")?.value||today();
  try{visGPS=await api("crm_visitas","GET",null,"?fecha=eq."+fecha+"&latitud=not.is.null&select=*,crm_clientes(nombre,codigo)"+vF())||[]}catch(e){}
  try{prosGPS=await api("crm_prospectos","GET",null,"?latitud=not.is.null&activo=eq.true&select=*"+vF())||[]}catch(e){}
  try{pedsGPS=await api("crm_pedidos","GET",null,"?fecha_entrega=eq."+fechaEnt+"&estado=in.(Pendiente,Confirmado,Venta directa)&select=*,crm_clientes(nombre,codigo,direccion,ciudad,latitud,longitud)"+vF())||[]}catch(e){}
  const bounds=[];
  // Marcadores de visitas
  visGPS.forEach(v=>{
    if(!v.latitud||!v.longitud)return;
    const esPedido=v.resultado==="Pedido";
    const color=esPedido?"#2196f3":"#9e9e9e";
    const m=L.circleMarker([v.latitud,v.longitud],{radius:9,fillColor:color,color:"#fff",weight:2,opacity:1,fillOpacity:0.9});
    const nom=v.crm_clientes?.nombre||"Sin nombre";
    const cod=v.crm_clientes?.codigo||"";
    m.bindPopup(`<div style="font-family:DM Sans,sans-serif;min-width:160px">
      <div style="font-weight:800;font-size:13px;margin-bottom:4px">📍 ${nom}</div>
      <div style="font-size:11px;color:#666">${cod}</div>
      <div style="margin-top:6px"><span style="background:${esPedido?"#e8f5e9":"#f5f5f5"};color:${esPedido?"#2e7d32":"#666"};padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700">${v.resultado}</span></div>
      ${v.monto_pedido?`<div style="margin-top:4px;font-size:12px;font-weight:700;color:#2e7d32">${fmt(v.monto_pedido)}</div>`:""}
      <div style="margin-top:4px;font-size:10px;color:#aaa">${v.hora||""} · ${v.fecha}</div>
      ${v.observaciones?`<div style="margin-top:4px;font-size:11px;color:#666">${v.observaciones}</div>`:""}
    </div>`);
    if(window._mapLayers?.vis!==false){m.addTo(_mapObj)}
    window._mapVisMarkers.push(m);
    bounds.push([v.latitud,v.longitud]);
  });
  // Marcadores de prospectos
  const colPro={"Identificado":"#9e9e9e","Contactado":"#2196f3","Seguimiento":"#ff9800","Propuesta":"#e91e63","Convertido":"#4caf50","Perdido":"#f44336"};
  prosGPS.forEach(p=>{
    if(!p.latitud||!p.longitud)return;
    const color=colPro[p.etapa]||"#ff9800";
    const m=L.circleMarker([p.latitud,p.longitud],{radius:9,fillColor:color,color:"#fff",weight:2,opacity:1,fillOpacity:0.9});
    m.bindPopup(`<div style="font-family:DM Sans,sans-serif;min-width:160px">
      <div style="font-weight:800;font-size:13px;margin-bottom:4px">🎯 ${p.nombre}</div>
      <div style="font-size:11px;color:#666">${p.ciudad||""} · ${p.direccion||""}</div>
      <div style="margin-top:6px"><span style="background:${color}22;color:${color};padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700">${p.etapa}</span></div>
      ${p.valor_potencial?`<div style="margin-top:4px;font-size:12px;font-weight:700">${fmt(p.valor_potencial)}/mes</div>`:""}
      ${p.celular?`<div style="margin-top:4px;font-size:11px;color:#666">📱 ${p.celular}</div>`:""}
      <div style="margin-top:6px"><button onclick="_mapObj&&showView('prospectos')" style="font-size:11px;background:#e91e63;color:#fff;border:none;border-radius:6px;padding:3px 10px;cursor:pointer">Ver prospecto</button></div>
    </div>`);
    if(window._mapLayers?.pro!==false){m.addTo(_mapObj)}
    window._mapProMarkers.push(m);
    bounds.push([p.latitud,p.longitud]);
  });
  // Marcadores de pedidos (entregas)
  pedsGPS.forEach(p=>{
    const cl=p.crm_clientes||{};
    if(!cl.latitud||!cl.longitud)return;
    const m=L.circleMarker([cl.latitud,cl.longitud],{radius:11,fillColor:"#4caf50",color:"#fff",weight:2.5,opacity:1,fillOpacity:0.92});
    m.bindPopup(`<div style="font-family:DM Sans,sans-serif;min-width:170px">
      <div style="font-weight:800;font-size:13px;margin-bottom:2px">🚚 ENTREGA</div>
      <div style="font-weight:700;font-size:13px">${cl.nombre||""}</div>
      <div style="font-size:11px;color:#666">${cl.codigo||""}</div>
      <div style="font-size:11px;color:#666;margin-top:2px">📍 ${cl.direccion||""}, ${cl.ciudad||""}</div>
      <div style="margin-top:6px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:12px;font-weight:700;color:#2e7d32">${fmt(p.total||0)}</span>
        <span style="font-size:10px;background:#e8f5e9;color:#2e7d32;padding:2px 8px;border-radius:10px;font-weight:700">Ped #${p.numero_pedido}</span>
      </div>
      <div style="font-size:11px;color:#666;margin-top:2px">Entrega: ${p.fecha_entrega||""}</div>
      <div style="font-size:11px;color:#666">Pago: ${p.condicion_pago||""}</div>
      ${p.observaciones?`<div style="margin-top:4px;font-size:10px;color:#888">${p.observaciones}</div>`:""}
    </div>`);
    if(window._mapLayers?.ped!==false){m.addTo(_mapObj)}
    window._mapPedMarkers.push(m);
    bounds.push([cl.latitud,cl.longitud]);
  });
  // Ajustar zoom al contenido
  if(bounds.length>0)_mapObj.fitBounds(bounds,{padding:[30,30],maxZoom:15});
  // Stats
  const se=$("map-stats");
  if(se)se.innerHTML=`📍 ${visGPS.length} visitas · 🎯 ${prosGPS.length} prospectos · 🚚 ${pedsGPS.filter(p=>p.crm_clientes?.latitud).length} entregas con GPS`;
  _mapObj.invalidateSize();
}

function toggleMapLayer(tipo){
  if(tipo==="vis"){
    window._mapLayers.vis=!window._mapLayers.vis;
    const btn=$("mb-vis");if(btn)btn.style.opacity=window._mapLayers.vis?"1":"0.4";
    (window._mapVisMarkers||[]).forEach(m=>{if(window._mapLayers.vis)m.addTo(_mapObj);else _mapObj.removeLayer(m)});
  }else if(tipo==="pro"){
    window._mapLayers.pro=!window._mapLayers.pro;
    const btn=$("mb-pro");if(btn)btn.style.opacity=window._mapLayers.pro?"1":"0.4";
    (window._mapProMarkers||[]).forEach(m=>{if(window._mapLayers.pro)m.addTo(_mapObj);else _mapObj.removeLayer(m)});
  }else if(tipo==="ped"){
    window._mapLayers.ped=!window._mapLayers.ped;
    const btn=$("mb-ped");if(btn)btn.style.opacity=window._mapLayers.ped?"1":"0.4";
    (window._mapPedMarkers||[]).forEach(m=>{if(window._mapLayers.ped)m.addTo(_mapObj);else _mapObj.removeLayer(m)});
  }
}

function filterProsp(){
  const et=$("fp-et")?.value||"";
  const ven=$("fp-vp")?.value||"";
  const q=($("fp-q")?.value||"").toLowerCase();
  let f=prospectos;
  if(et)f=f.filter(p=>p.etapa===et);
  if(ven)f=f.filter(p=>p.vendedor_id===ven);
  if(q)f=f.filter(p=>(p.nombre||"").toLowerCase().includes(q)||(p.ciudad||"").toLowerCase().includes(q)||(p.codigo||"").toLowerCase().includes(q));
  const hoy=today();
  $("prosp-tb").innerHTML=f.length?f.map(p=>{
    const cfg=epCfg(p.etapa);
    const vencido=p.proximo_contacto&&p.proximo_contacto<hoy&&!["Convertido","Perdido"].includes(p.etapa);
    return`<tr onclick="viewProspDetail('${p.id}')">
    <td style="font-family:monospace;font-size:11px;color:var(--muted)">${p.codigo}</td>
    <td style="font-weight:600">${p.nombre}</td>

    ${U.rol!=="vendedor"?`<td style="color:var(--muted);font-size:12px">${prospVendNombre(p)}</td>`:""}
    <td style="color:var(--accent)">→</td></tr>`}).join("")
  :'<tr><td colspan="7" class="empty">Sin prospectos</td></tr>'}

async function saveProsp(eid){
  const nom=$("pp-nom")?.value.trim();
  const dir=$("pp-dir")?.value.trim();
  const cel=$("pp-cel")?.value.trim();
  if(!nom){showT("El nombre del negocio es obligatorio","error");$("pp-nom")?.focus();return}
  if(!dir){showT("La dirección es obligatoria","error");$("pp-dir")?.focus();return}
  if(!cel){showT("El celular es obligatorio","error");$("pp-cel")?.focus();return}
  if($("pp-fue")?.value==="Otro"&&!$("pp-fue-otro")?.value.trim()){showT("Describe el canal 'Otro'","error");$("pp-fue-otro")?.focus();return}
  if(!eid){
    const nomNorm=nom.trim().toLowerCase();
    const dupProsp=prospectos.find(p=>p.nombre?.trim().toLowerCase()===nomNorm);
    const dupCl=clientes.find(c=>c.nombre?.trim().toLowerCase()===nomNorm);
    if(dupProsp){showT("Ya existe un prospecto con ese nombre: "+dupProsp.nombre,"error");return}
    if(dupCl){showT("Ya existe un cliente con ese nombre: "+dupCl.nombre,"error");return}
  }
  const vid=U.rol==="vendedor"?U.vendedor_id:($("pp-ven")?$("pp-ven").value:U.vendedor_id);
  const payload={
    nombre:nom,tipo_documento:$("pp-td")?.value||"13",numero_documento:$("pp-doc")?.value.trim()||null,
    vendedor_id:vid||null,tipologia_id:$("pp-tip")?.value||null,lista_precio_id:$("pp-lis")?.value||null,
    fuente:(()=>{const f=$("pp-fue")?.value||"Visita en ruta";return f==="Otro"?"Otro":f;})(),
    fuente_detalle:(()=>{const f=$("pp-fue")?.value||"";return f==="Otro"?($("pp-fue-otro")?.value.trim()||null):null;})(),
    ciudad:$("pp-ciu")?.value||null,barrio:$("pp-bar")?.value.trim()||null,
    direccion:$("pp-dir")?.value.trim()||null,zona:$("pp-zon")?.value.trim()||"TAT",
    telefono:$("pp-tel")?.value.trim()||null,celular:$("pp-cel")?.value.trim()||null,
    correo_electronico:$("pp-ema")?.value.trim()||null,
    etapa:$("pp-eta")?.value||"Identificado",
    valor_potencial:parseFloat(($("pp-val")?.value||"0").replace(/\./g,"").replace(/,/g,""))||0,
    probabilidad:parseInt($("pp-prob")?.value)||10,
    proximo_contacto:$("pp-prox")?.value||null,
    observaciones:$("pp-obs")?.value||null,
    latitud:_pL||null,longitud:_pN||null,
    updated_at:new Date().toISOString()
  };
  const btn=$("pp-sv");btn.disabled=true;
  try{
    if(eid){
      await api("crm_prospectos","PATCH",payload,"?id=eq."+eid);
      showT("Prospecto actualizado");
      showView("prospectos");
    }else{
      payload.codigo=genCodigoProsp();payload.created_by=U.usuario;
      const res=await api("crm_prospectos","POST",payload);
      const newId=res&&res[0]?res[0].id:null;
      if(newId&&payload.proximo_contacto){
        try{
          await api("crm_actividades","POST",{
            tipo:"llamada",fecha:payload.proximo_contacto,hora_inicio:"09:00",
            titulo:"Primer contacto con "+nom,
            vendedor_id:vid||null,prospecto_id:newId,
            estado:"pendiente",created_by:U.usuario
          });
          showT("✓ Prospecto creado — actividad de primer contacto programada");
        }catch{showT("Prospecto creado ✓");}
      }else{showT("Prospecto creado ✓")}
      showView("prospectos");
    }
  }catch(e){showT(e.message,"error")}finally{btn.disabled=false}
}

  const payload={prospecto_id:pid,vendedor_id:U.vendedor_id||U.id,fecha:today(),hora:new Date().toLocaleTimeString("es-CO",{hour:"2-digit",minute:"2-digit",hour12:false}),tipo:tp,resultado:res,observaciones:obs||null,proximo_contacto:prox||null,nueva_etapa:eta||null};
  try{
    await api("crm_prospecto_seguimientos","POST",payload);
    const upd={updated_at:new Date().toISOString()};
    if(prox)upd.proximo_contacto=prox;
    if(eta)upd.etapa=eta;
    await api("crm_prospectos","PATCH",upd,"?id=eq."+pid);
    showT("Seguimiento registrado ✓");
    await loadProsp();
    viewProspDetail(pid);
  }catch(e){showT(e.message,"error")}
}

async function perdProsp(pid){
  const motivo=prompt("Motivo de descarte (opcional):");
  if(motivo===null)return;
  try{
    await api("crm_prospectos","PATCH",{etapa:"Perdido",motivo_perdida:motivo||null,updated_at:new Date().toISOString()},"?id=eq."+pid);
    showT("Marcado como perdido");await loadProsp();showView("prospectos");
  }catch(e){showT(e.message,"error")}
}

// ─── CONVERSIÓN PROSPECTO → CLIENTE ────────────────
async function convertProspToClient(pid){
  const p=prospectos.find(x=>x.id===pid);
  if(!p){showT("Prospecto no encontrado","error");return}
  if(!confirm(`¿Convertir "${p.nombre}" a cliente?\n\nSe creará con los datos básicos del prospecto. Deberás completar su perfil antes del primer pedido.`))return;
  const codigo=p.numero_documento||("CLI"+Date.now().toString().slice(-6));
  const payload={
    codigo:codigo,nombre:p.nombre,tipo_documento:p.tipo_documento||"13",
    vendedor_id:p.vendedor_id||U.vendedor_id||null,
    tipologia_id:p.tipologia_id||null,lista_precio_id:p.lista_precio_id||null,
    ciudad:p.ciudad||"",barrio:p.barrio||null,direccion:p.direccion||"",zona:p.zona||"TAT",
    telefono:p.telefono||"Sin registro",celular:p.celular||"Sin registro",
    correo_electronico:p.correo_electronico||null,
    fecha_ingreso:today(),created_by:U.usuario,
    prospecto_incompleto:true,origen_prospecto_id:pid
  };
  try{
    const res=await api("crm_clientes","POST",payload);
    if(res&&res[0]){
      const clId=res[0].id;
      await api("crm_prospectos","PATCH",{etapa:"Convertido",cliente_id:clId,updated_at:new Date().toISOString()},"?id=eq."+pid);
      await loadProsp();await loadCl();
      showT("✓ Cliente creado — completa su perfil","warning");
      const cl=clientes.find(c=>c.id===clId)||res[0];
      renderClForm(cl);
    }
  }catch(e){
    if(e.message.includes("duplicate"))showT("Ya existe un cliente con ese documento","error");
    else showT(e.message,"error");
  }
}

// ═══════════════════════════════════════════════════
// ═══ AGENDA ═════════════════════════════════════════
// ═══════════════════════════════════════════════════

async function loadActs(){
  try{
    const m=_agMes||curMonth();
    const [y,mo]=m.split("-").map(Number);
    const prevM=mo===1?`${y-1}-12`:`${y}-${String(mo-1).padStart(2,"0")}`;
    const nextM=mo===12?`${y+1}-01`:`${y}-${String(mo+1).padStart(2,"0")}`;
    const from=prevM+"-25",to=nextM+"-07";
    let vf="";
    if(U.rol==="vendedor")vf="&vendedor_id=eq."+U.vendedor_id;
    else if(U.rol==="lider"&&supIds.length)vf="&vendedor_id=in.("+supIds.join(",")+")";
    const sel="&select=*,crm_vendedores(nombre),crm_clientes(nombre),crm_prospectos(nombre)";
    const [month,overdue]=await Promise.all([
      api("crm_actividades","GET",null,`?order=fecha,hora_inicio${sel}&fecha=gte.${from}&fecha=lte.${to}${vf}`),
      api("crm_actividades","GET",null,`?estado=eq.pendiente&fecha=lt.${today()}&order=fecha.desc${sel}${vf}`)
    ]);
    const seen=new Set((month||[]).map(a=>a.id));
    actividades=[...(month||[]),...(overdue||[]).filter(a=>!seen.has(a.id))];
  }catch(e){showT(e.message,"error")}
}

async function renderAgenda(){
  if(!_agFecha)_agFecha=today();
  if(!_agMes)_agMes=today().slice(0,7);
  await Promise.all([loadCl(),loadProsp(),loadActs()]);
  const canCreate=U.rol==="vendedor"||(U.rol==="lider"&&U.vendedor_id)||U.rol==="admin";
  const venOpts=U.rol!=="vendedor"?`<select id="ag-fven" onchange="renderAgDay()"><option value="">Todos los vendedores</option>${vV().map(v=>`<option value="${v.id}">${v.nombre}</option>`).join("")}</select>`:"";
  $("mc").innerHTML=`
    <div class="topbar">
      <h2>📅 Agenda</h2>
      ${canCreate?`<button class="btn bp bsm" onclick="renderActForm()">+ Nueva actividad</button>`:""}
    </div>
    <div class="ag-filter">
      <select id="ag-ftipo" onchange="renderAgDay()">
        <option value="">Todos los tipos</option>
        ${ACT_TIPOS.map(t=>`<option value="${t.v}">${t.ic} ${t.l}</option>`).join("")}
      </select>
      ${venOpts}
      <select id="ag-fest" onchange="renderAgDay()">
        <option value="">Todos los estados</option>
        <option value="pendiente">⏳ Pendiente</option>
        <option value="completada">✅ Completada</option>
        <option value="cancelada">❌ Cancelada</option>
      </select>
    </div>
    <div class="ag-wrap">
      <div id="ag-cal-panel"></div>
      <div id="ag-day-panel"></div>
    </div>`;
  renderMiniCal();
  renderAgDay();
}

function renderMiniCal(){
  const [y,mo]=_agMes.split("-").map(Number);
  const firstDow=new Date(y,mo-1,1).getDay();
  const startOffset=(firstDow+6)%7;
  const daysInMonth=new Date(y,mo,0).getDate();
  const mNames=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
  const actDays=new Set(actividades.filter(a=>a.fecha.startsWith(_agMes)).map(a=>a.fecha));
  const pendDays=new Set(actividades.filter(a=>a.fecha.startsWith(_agMes)&&a.estado==="pendiente").map(a=>a.fecha));
  let cells="";
  for(let i=0;i<startOffset;i++)cells+="<div></div>";
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${_agMes}-${String(d).padStart(2,"0")}`;
    const isTd=ds===today(),isSel=ds===_agFecha;
    const hasPend=pendDays.has(ds),hasAct=actDays.has(ds);
    let cls="ag-cd";
    if(isTd)cls+=" ag-today";
    if(isSel)cls+=" ag-sel";
    const dot=hasAct?`<div class="ag-dot" style="background:${hasPend?"#e53935":"#aaa"}"></div>`:"<div style='height:6px'></div>";
    cells+=`<div class="${cls}" onclick="selAgDay('${ds}')">${d}${dot}</div>`;
  }
  $("ag-cal-panel").innerHTML=`<div class="ag-cal">
    <div class="ag-cal-hdr">
      <button onclick="navAgMes(-1)">◀</button>
      <strong>${mNames[mo-1]} ${y}</strong>
      <button onclick="navAgMes(1)">▶</button>
    </div>
    <div class="ag-cal-grid">
      ${["L","M","X","J","V","S","D"].map(d=>`<div class="ag-cal-wd">${d}</div>`).join("")}
      ${cells}
    </div>
  </div>`;
}

function selAgDay(f){_agFecha=f;renderMiniCal();renderAgDay()}

function navAgMes(dir){
  const [y,mo]=_agMes.split("-").map(Number);
  let ny=y,nm=mo+dir;
  if(nm<1){nm=12;ny--}else if(nm>12){nm=1;ny++}
  _agMes=`${ny}-${String(nm).padStart(2,"0")}`;
  if(!_agFecha.startsWith(_agMes))_agFecha=_agMes+"-01";
  loadActs().then(()=>{renderMiniCal();renderAgDay()});
}

function renderAgDay(){
  const ftipo=$("ag-ftipo")?.value||"";
  const fven=$("ag-fven")?.value||"";
  const fest=$("ag-fest")?.value||"";
  const d=new Date(_agFecha+"T12:00:00");
  const dayNames=["domingo","lunes","martes","miércoles","jueves","viernes","sábado"];
  const mNames=["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
  const label=`${dayNames[d.getDay()]} ${d.getDate()} de ${mNames[d.getMonth()]} de ${d.getFullYear()}`;
  let acts=actividades.filter(a=>a.fecha===_agFecha);
  if(ftipo)acts=acts.filter(a=>a.tipo===ftipo);
  if(fven)acts=acts.filter(a=>a.vendedor_id===fven);
  if(fest)acts=acts.filter(a=>a.estado===fest);
  const canCreate=U.rol==="vendedor"||(U.rol==="lider"&&U.vendedor_id)||U.rol==="admin";
  const pending=acts.filter(a=>a.estado==="pendiente").length;
  const done=acts.filter(a=>a.estado==="completada").length;
  $("ag-day-panel").innerHTML=`<div class="ag-day">
    <div class="ag-day-hdr">
      <div>
        <strong style="font-size:15px;text-transform:capitalize">${label}</strong>
        ${pending>0?`<div style="font-size:11px;color:#f57c00;font-weight:600;margin-top:2px">⏳ ${pending} pendiente${pending!==1?"s":""} · ✅ ${done} completada${done!==1?"s":""}</div>`:""}
      </div>
      ${canCreate?`<button class="btn bp bsm" onclick="renderActForm(null,'${_agFecha}')">+ Agregar</button>`:""}
    </div>
    ${acts.length?acts.map(a=>renderActCard(a)).join(""):`<div class="ag-empty">📭<br><span style="font-size:13px">Sin actividades para este día</span>${canCreate?`<br><br><button class="btn bp bsm" onclick="renderActForm(null,'${_agFecha}')">+ Programar actividad</button>`:""}</div>`}
  </div>`;
}

function renderActCard(a){
  const tipo=ACT_TIPOS.find(t=>t.v===a.tipo)||{ic:"📋",col:"#999",l:a.tipo||""};
  const stC={pendiente:"#f57c00",completada:"#388e3c",cancelada:"#9e9e9e"};
  const stL={pendiente:"Pendiente",completada:"Completada",cancelada:"Cancelada"};
  const stIc={pendiente:"⏳",completada:"✅",cancelada:"❌"};
  const col=stC[a.estado]||"#999";
  const clienteNom=a.crm_clientes?.nombre||"";
  const prospNom=a.crm_prospectos?.nombre||"";
  const vendNom=U.rol!=="vendedor"?(a.crm_vendedores?.nombre||""):"";
  const myId=U.vendedor_id;
  const canEdit=U.rol==="admin"||(U.rol==="vendedor"&&a.vendedor_id===myId)||(U.rol==="lider"&&myId&&a.vendedor_id===myId);
  const isPending=a.estado==="pendiente";
  return`<div class="ag-act-card" id="card-${a.id}" style="border-left-color:${tipo.col}">
    <div class="act-top">
      <span class="act-time">${(a.hora_inicio||"").slice(0,5)||"—"}</span>
      <span class="act-ic">${tipo.ic}</span>
      <span class="act-title">${escHtml(a.titulo)}</span>
      <span style="background:${col}18;color:${col};font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700;white-space:nowrap">${stIc[a.estado]||""} ${stL[a.estado]||a.estado}</span>
      ${a.prioridad==="alta"?`<span style="background:#ffebee;color:#c62828;font-size:10px;padding:2px 6px;border-radius:8px;font-weight:700">🔴 Alta</span>`:""}
    </div>
    <div class="act-sub">
      <span style="color:${tipo.col};font-weight:600">${tipo.ic} ${tipo.l}</span>
      ${clienteNom?`<span>👥 <strong>${escHtml(clienteNom)}</strong></span>`:""}
      ${prospNom?`<span>🎯 <strong>${escHtml(prospNom)}</strong></span>`:""}
      ${vendNom?`<span>👤 ${escHtml(vendNom)}</span>`:""}
    </div>
    ${a.descripcion?`<div class="act-sub" style="margin-top:6px;color:var(--fg)">💬 ${escHtml(a.descripcion)}</div>`:""}
    ${a.resultado?`<div class="act-result">📝 <strong>Resultado:</strong> ${escHtml(a.resultado)}</div>`:""}
    ${canEdit&&isPending?`<div class="act-actions">
      <button class="btn bg bsm" onclick="toggleActRes('${a.id}')">✓ Completar</button>
      <button class="btn bs bsm" onclick="editAct('${a.id}')">✏ Editar</button>
      <button class="btn br bsm" onclick="cancelAct('${a.id}')">✗ Cancelar</button>
    </div>
    <div class="act-res-box" id="res-box-${a.id}">
      <textarea id="res-txt-${a.id}" placeholder="Escribe el resultado de esta actividad..." rows="2"></textarea>
      <div style="display:flex;gap:8px;margin-top:6px">
        <button class="btn bg bsm" onclick="completeAct('${a.id}')">Guardar y completar</button>
        <button class="btn bs bsm" onclick="toggleActRes('${a.id}')">Cancelar</button>
      </div>
    </div>`:""}
  </div>`;
}

function toggleActRes(id){
  const b=$("res-box-"+id);
  if(!b)return;
  const open=b.style.display!=="block";
  b.style.display=open?"block":"none";
  if(open)$("res-txt-"+id)?.focus();
}

async function completeAct(id){
  const snap={...(actividades.find(x=>x.id===id)||{})};
  const txt=$("res-txt-"+id)?.value.trim()||"";
  try{
    await api("crm_actividades","PATCH",{estado:"completada",resultado:txt||null},"?id=eq."+id);
    showT("✅ Actividad completada");
    await loadActs();renderMiniCal();renderAgDay();
    const panel=$("ag-day-panel")?.querySelector(".ag-day");
    if(panel&&snap.id){
      const nom=snap.crm_clientes?.nombre||snap.crm_prospectos?.nombre||"";
      const clId=snap.cliente_id||"";const prId=snap.prospecto_id||"";
      const ns=document.createElement("div");
      ns.className="ag-act-card";
      ns.style.cssText="border-left-color:#4caf50;background:#f1f8e9;margin-bottom:12px";
      ns.innerHTML=`<div style="font-weight:700;font-size:13px;color:#2e7d32;margin-bottom:10px">✅ Completada · ¿Cuál es el siguiente paso${nom?" con <strong>"+escHtml(nom)+"</strong>":""}?</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn bg bsm" onclick="renderActForm(null,'${_agFecha}','${clId}','${prId}')">📅 Programar seguimiento</button>
          <button class="btn bs bsm" onclick="this.closest('.ag-act-card').remove()">No por ahora</button>
        </div>`;
      panel.prepend(ns);
    }
  }catch(e){showT(e.message,"error")}
}

async function cancelAct(id){
  if(!confirm("¿Cancelar esta actividad?"))return;
  try{
    await api("crm_actividades","PATCH",{estado:"cancelada"},"?id=eq."+id);
    showT("Actividad cancelada");
    await loadActs();renderMiniCal();renderAgDay();
  }catch(e){showT(e.message,"error")}
}

function editAct(id){
  const a=actividades.find(x=>x.id===id);
  if(a)renderActForm(a);
}

function renderActForm(act,defaultFecha,defaultClienteId,defaultProspectoId){
  const retCtx=defaultClienteId||"";
  const f=act?.fecha||defaultFecha||_agFecha||today();
  const preClId=act?.cliente_id||defaultClienteId||"";
  const prePrId=act?.prospecto_id||defaultProspectoId||"";
  const vendOpts=vV().map(v=>`<option value="${v.id}" ${(act?act.vendedor_id===v.id:U.rol==="vendedor"&&v.id===U.vendedor_id)?"selected":""}>${v.nombre}</option>`).join("");
  const tipoOpts=ACT_TIPOS.map(t=>`<option value="${t.v}" ${act?.tipo===t.v?"selected":""}>${t.ic} ${t.l}</option>`).join("");
  const clOpts=clientes.map(c=>`<option value="${c.id}" ${c.id===preClId?"selected":""}>${c.nombre}</option>`).join("");
  const prOpts=prospectos.map(p=>`<option value="${p.id}" ${p.id===prePrId?"selected":""}>${p.nombre}</option>`).join("");
  $("mc").innerHTML=`
    <div style="margin-bottom:16px">
      <button class="btn bs bsm" onclick="renderAgenda()">← Volver a Agenda</button>
      <h2 style="margin-top:8px">${act?"Editar":"Nueva"} actividad</h2>
    </div>
    <div class="fc">
      <div class="grid g3">
        <div class="field"><label><span class="req">*</span> Tipo</label>
          <select id="act-tipo">${tipoOpts}</select></div>
        <div class="field"><label><span class="req">*</span> Fecha</label>
          <input type="date" id="act-fecha" value="${f}"></div>
        <div class="field"><label>Hora</label>
          <input type="time" id="act-hora" value="${act?.hora_inicio?.slice(0,5)||"08:00"}"></div>
      </div>
      <div class="field"><label><span class="req">*</span> Título</label>
        <input id="act-tit" value="${escHtml(act?.titulo||"")}" placeholder="Ej: Llamada de seguimiento a Juan García"></div>
      <div class="field"><label>Descripción / Notas</label>
        <textarea id="act-desc" rows="2" style="width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--border);font-family:var(--ff);font-size:14px;resize:vertical;box-sizing:border-box">${escHtml(act?.descripcion||"")}</textarea></div>
      <div class="grid g3">
        ${U.rol!=="vendedor"?`<div class="field"><label>Vendedor</label><select id="act-ven">${vendOpts}</select></div>`:""}
        <div class="field"><label>Prioridad</label>
          <select id="act-pri">
            <option value="media" ${!act||act.prioridad==="media"?"selected":""}>Media</option>
            <option value="alta" ${act?.prioridad==="alta"?"selected":""}>🔴 Alta</option>
            <option value="baja" ${act?.prioridad==="baja"?"selected":""}>Baja</option>
          </select></div>
      </div>
      <div class="st" style="margin-top:4px">Vincular (opcional)</div>
      <div class="grid g2">
        <div class="field"><label>👥 Cliente</label>
          <select id="act-cl"><option value="">Sin cliente</option>${clOpts}</select></div>
        <div class="field"><label>🎯 Prospecto</label>
          <select id="act-pr"><option value="">Sin prospecto</option>${prOpts}</select></div>
      </div>
      <input type="hidden" id="act-ret-cl" value="${retCtx}">
      <div style="display:flex;gap:10px;margin-top:8px">
        <button class="btn bp" onclick="saveAct(${act?"'"+act.id+"'":"null"})" style="flex:1;padding:14px;font-size:15px;font-weight:700">💾 Guardar actividad</button>
        <button class="btn bs" onclick="${retCtx?"eCl('"+retCtx+"')":'renderAgenda()'}" style="padding:14px 20px">Cancelar</button>
      </div>
    </div>`;
}

async function saveAct(eid){
  const tipo=$("act-tipo")?.value;
  const fecha=$("act-fecha")?.value;
  const hora=$("act-hora")?.value||null;
  const titulo=$("act-tit")?.value.trim();
  const desc=$("act-desc")?.value.trim()||null;
  const pri=$("act-pri")?.value||"media";
  const clId=$("act-cl")?.value||null;
  const prId=$("act-pr")?.value||null;
  const venId=U.rol==="vendedor"?U.vendedor_id:($("act-ven")?.value||null);
  if(!tipo){showT("Selecciona el tipo de actividad","error");return}
  if(!fecha){showT("La fecha es obligatoria","error");return}
  if(!titulo){showT("El título es obligatorio","error");return}
  const payload={tipo,fecha,hora_inicio:hora,titulo,descripcion:desc,prioridad:pri,
    vendedor_id:venId||null,cliente_id:clId||null,prospecto_id:prId||null};
  try{
    if(eid){
      await api("crm_actividades","PATCH",payload,"?id=eq."+eid);
      showT("✓ Actividad actualizada");
    }else{
      payload.estado="pendiente";
      payload.created_by=U.usuario;
      await api("crm_actividades","POST",payload);
      showT("✓ Actividad creada");
    }
    _agFecha=fecha;
    _agMes=fecha.slice(0,7);
    const retCl=$("act-ret-cl")?.value;
    if(retCl){const cl=clientes.find(c=>c.id===retCl);if(cl)renderClForm(cl);else await renderAgenda();}
    else await renderAgenda();
  }catch(e){showT(e.message,"error")}
}
</script>
